<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5ede0;
    --surface: #fdf8f0;
    --surface2: #ede3d4;
    --border: #d9c9b0;
    --border-light: #e8d9c4;
    --text: #2c1a0e;
    --muted: #8b7355;
    --accent: #b5440c;
    --amber: #c97d15;
    --sage: #4a6741;
    --cream: #fdf8f0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Lora', Georgia, serif;
    min-height: 100vh;
  }

  .back-bar {
    padding: 12px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border-light);
  }
  .back-link {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--accent); }

  /* ── Layout ── */
  .recipe-layout { display: block; }
  .meta-col { background: var(--surface); }

  /* ── Hero ── */
  .hero {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 40px 28px 36px;
  }
  .hero-eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 14px;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 700;
    color: var(--text);
    line-height: 1.1;
  }
  .hero-subtitle {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: clamp(15px, 2.5vw, 19px);
    color: var(--muted);
    margin-top: 5px;
  }
  .hero-rule {
    width: 36px;
    height: 2px;
    background: var(--accent);
    margin: 16px 0;
  }
  .hero-desc {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.75;
  }
  .hero-tags { display: flex; gap: 6px; margin-top: 16px; flex-wrap: wrap; }
  .tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 3px 9px;
  }

  /* ── Macros ── */
  .macros-bar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 20px 28px;
  }
  .macros-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .macros-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
  }
  .macro-cell {
    background: var(--surface);
    border: 1px solid var(--border-light);
    padding: 12px 6px;
    text-align: center;
  }
  .macro-value {
    font-family: 'Playfair Display', serif;
    font-size: 19px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    margin-bottom: 4px;
  }
  .macro-value sup {
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    font-weight: 400;
  }
  .macro-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .macro-cell.highlight .macro-value { color: var(--accent); }

  /* ── Servings ── */
  .servings-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .servings-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .servings-ctrl { display: flex; align-items: center; border: 1px solid var(--border); }
  .s-btn {
    background: none;
    border: none;
    color: var(--muted);
    width: 32px;
    height: 32px;
    font-size: 18px;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    transition: background 0.15s, color 0.15s;
  }
  .s-btn:hover { background: var(--surface2); color: var(--text); }
  .s-val {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    min-width: 44px;
    text-align: center;
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
  }
  .servings-note { font-size: 13px; color: var(--muted); font-style: italic; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    padding: 0 24px;
  }
  .tab-btn {
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 14px 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .content { max-width: 680px; margin: 0 auto; padding: 36px 24px 64px; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── Ingredients ── */
  .ing-group { margin-bottom: 32px; }
  .ing-group-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border-light);
  }
  .ing-row {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid var(--border-light);
    font-size: 14px;
  }
  .ing-row:last-child { border-bottom: none; }
  .ing-amt {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
    min-width: 52px;
    text-align: right;
    flex-shrink: 0;
  }
  .ing-unit {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    min-width: 28px;
    flex-shrink: 0;
  }
  .ing-name { color: var(--text); flex: 1; }
  .ing-note { font-size: 12px; color: var(--muted); font-style: italic; flex-shrink: 0; }

  /* ── Steps ── */
  .step { display: grid; grid-template-columns: 44px 1fr; position: relative; }
  .step-left { display: flex; flex-direction: column; align-items: center; padding-top: 2px; }
  .step-num {
    width: 30px;
    height: 30px;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    background: var(--surface);
    z-index: 1;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .step-num:hover { border-color: var(--amber); color: var(--amber); }
  .step.done .step-num {
    background: var(--sage);
    border-color: var(--sage);
    color: white;
  }
  .step-line {
    width: 1px;
    background: var(--border-light);
    flex: 1;
    margin: 6px 0;
    min-height: 16px;
  }
  .step:last-child .step-line { display: none; }
  .step-body { padding: 0 0 32px 16px; }
  .step-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.2;
    cursor: pointer;
  }
  .step-title:hover { color: var(--accent); }
  .step.done .step-title {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: var(--border);
  }
  .step-text { font-size: 14px; color: var(--muted); line-height: 1.75; margin-bottom: 6px; }
  .step-bullets { list-style: none; margin: 10px 0; }
  .step-bullets li {
    font-size: 14px;
    color: var(--text);
    padding: 6px 0 6px 20px;
    position: relative;
    line-height: 1.55;
    border-bottom: 1px solid var(--border-light);
  }
  .step-bullets li:last-child { border-bottom: none; }
  .step-bullets li::before {
    content: '—';
    position: absolute;
    left: 0;
    color: var(--amber);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
  }
  .step-note {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    margin-top: 10px;
    padding: 8px 14px;
    border-left: 2px solid var(--border);
    background: var(--surface2);
  }

  /* ── Timers ── */
  .step-timer { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
  .timer-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .timer-btn:hover { border-color: var(--amber); color: var(--amber); }
  .timer-btn.running { border-color: var(--amber); color: var(--amber); background: rgba(201,125,21,0.08); }
  .timer-btn.done { border-color: var(--sage); color: var(--sage); background: rgba(74,103,65,0.08); }
  .timer-reset {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 6px;
    display: none;
    transition: color 0.15s;
  }
  .timer-reset:hover { color: var(--text); }

  /* ── Notes ── */
  .note-card {
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-left: 3px solid var(--amber);
    padding: 16px 20px;
    margin-bottom: 12px;
  }
  .note-card-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 8px;
  }
  .note-card p { font-size: 14px; color: var(--muted); line-height: 1.75; }
  .note-card strong { color: var(--text); font-weight: 500; }

  /* ── Desktop two-column layout ── */
  @media (min-width: 760px) {
    .recipe-layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      align-items: start;
    }
    .meta-col {
      position: sticky;
      top: 0;
      max-height: 100vh;
      overflow-y: auto;
      border-right: 1px solid var(--border);
    }
    .meta-col::-webkit-scrollbar { width: 4px; }
    .meta-col::-webkit-scrollbar-track { background: transparent; }
    .meta-col::-webkit-scrollbar-thumb { background: var(--border); }
    .content { max-width: none; margin: 0; }
  }

  @media (max-width: 480px) {
    .macros-grid { grid-template-columns: repeat(3, 1fr); }
    .content { padding: 24px 16px 48px; }
    .tab-btn { padding: 12px 10px; font-size: 9px; }
  }
</style>
</head>
<body>

<div class="back-bar">
  <a class="back-link" href="index.html">← All Recipes</a>
</div>

<div class="recipe-layout">

  <div class="meta-col">
    <div class="hero" id="hero">
      <div class="hero-eyebrow" id="eyebrow">Loading...</div>
      <h1 id="title"></h1>
      <div class="hero-subtitle" id="subtitle"></div>
      <div class="hero-rule"></div>
      <div class="hero-desc" id="desc"></div>
      <div class="hero-tags" id="tags"></div>
    </div>

    <div class="macros-bar" id="macros-bar" style="display:none">
      <div class="macros-label">Nutrition · per serving</div>
      <div class="macros-grid" id="macros-grid"></div>
    </div>

    <div class="servings-bar">
      <span class="servings-label">Servings</span>
      <div class="servings-ctrl">
        <button class="s-btn" onclick="changeServings(-1)">−</button>
        <div class="s-val" id="s-val">3</div>
        <button class="s-btn" onclick="changeServings(1)">+</button>
      </div>
      <span class="servings-note" id="s-note">3 containers</span>
    </div>
  </div>

  <div class="content-col">
    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('ingredients', this)">Ingredients</button>
      <button class="tab-btn" onclick="showTab('steps', this)">Steps</button>
      <button class="tab-btn" onclick="showTab('notes', this)">Notes</button>
    </div>

    <div class="content">
      <div id="panel-ingredients" class="panel active"></div>
      <div id="panel-steps" class="panel"></div>
      <div id="panel-notes" class="panel"></div>
    </div>
  </div>

</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
  import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

  const FIREBASE_CONFIG = {
    apiKey:            "AIzaSyCdWDvObKrSCfqeHsbENsEjJMTVdRGh2mk",
    authDomain:        "recipes-496701.firebaseapp.com",
    projectId:         "recipes-496701",
    storageBucket:     "recipes-496701.firebasestorage.app",
    messagingSenderId: "151018575958",
    appId:             "1:151018575958:web:5b1c87caa5b1dacdf383f7",
  };

  const app = initializeApp(FIREBASE_CONFIG);
  const db  = getFirestore(app);

  let recipe = null;
  let servings = 3;
  let baseServings = 3;

  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  if (!id) window.location.href = 'index.html';

  try {
    const snap = await getDoc(doc(db, 'recipes', id));
    if (!snap.exists()) {
      document.getElementById('title').textContent = 'Recipe not found';
    } else {
      recipe = snap.data();
      servings = recipe.servings;
      baseServings = recipe.servings;
      render();
    }
  } catch (err) {
    document.getElementById('title').textContent = 'Failed to load recipe';
    document.getElementById('eyebrow').textContent = err.message;
  }

  Object.assign(window, { changeServings, showTab, toggleStep, toggleTimer, resetTimer });

  function fmt(val) {
    if (typeof val === 'string') return val;
    if (val === Math.round(val)) return val.toString();
    const fracs = [[0.25,'¼'],[0.333,'⅓'],[0.5,'½'],[0.667,'⅔'],[0.75,'¾']];
    const whole = Math.floor(val);
    const frac = val - whole;
    for (const [f, sym] of fracs) {
      if (Math.abs(frac - f) < 0.05) return (whole > 0 ? whole : '') + sym;
    }
    return Math.round(val * 10) / 10;
  }

  function render() {
    document.title = recipe.title;
    const servingWord = recipe.servings === 1 ? 'serving' : 'servings';
    document.getElementById('eyebrow').textContent = `${recipe.category || 'Recipe'} · ${recipe.servings} ${servingWord}`;
    document.getElementById('title').textContent = recipe.title;
    document.getElementById('subtitle').textContent = recipe.subtitle || '';
    document.getElementById('desc').textContent = recipe.description || '';
    document.getElementById('tags').innerHTML = (recipe.tags || []).map(t => `<span class="tag">${t}</span>`).join('');

    const m = recipe.macros;
    document.getElementById('macros-bar').style.display = '';
    document.getElementById('macros-grid').innerHTML = `
      <div class="macro-cell"><div class="macro-value">${m.calories}<sup>kcal</sup></div><div class="macro-label">Cal</div></div>
      <div class="macro-cell highlight"><div class="macro-value">${m.protein}<sup>g</sup></div><div class="macro-label">Protein</div></div>
      <div class="macro-cell"><div class="macro-value">${m.carbs}<sup>g</sup></div><div class="macro-label">Carbs</div></div>
      <div class="macro-cell"><div class="macro-value">${m.fat}<sup>g</sup></div><div class="macro-label">Fat</div></div>
      <div class="macro-cell"><div class="macro-value">${m.fiber}<sup>g</sup></div><div class="macro-label">Fiber</div></div>
    `;

    renderIngredients();
    renderSteps();
    renderNotes();
    updateServingsDisplay();
  }

  function renderIngredients() {
    const ratio = servings / baseServings;
    document.getElementById('panel-ingredients').innerHTML = recipe.ingredientGroups.map(g => `
      <div class="ing-group">
        <div class="ing-group-title">${g.label}</div>
        ${g.ingredients.map(i => `
          <div class="ing-row">
            <span class="ing-amt" data-base="${i.base}">${fmt(i.base * ratio)}</span>
            <span class="ing-unit">${i.unit || ''}</span>
            <span class="ing-name">${i.name}</span>
            ${i.note ? `<span class="ing-note">${i.note}</span>` : ''}
          </div>
        `).join('')}
      </div>
    `).join('');
  }

  function renderSteps() {
    document.getElementById('panel-steps').innerHTML = recipe.steps.map((s, i) => `
      <div class="step" id="step-${i+1}">
        <div class="step-left">
          <div class="step-num" onclick="toggleStep(${i+1})">${i+1}</div>
          <div class="step-line"></div>
        </div>
        <div class="step-body">
          <div class="step-title" onclick="toggleStep(${i+1})">${s.title}</div>
          ${s.text ? `<p class="step-text">${s.text}</p>` : ''}
          ${s.bullets && s.bullets.length ? `
            <ul class="step-bullets">
              ${s.bullets.map(b => `<li>${b}</li>`).join('')}
            </ul>
          ` : ''}
          ${s.note ? `<div class="step-note">${s.note}</div>` : ''}
          ${s.timer ? `
            <div class="step-timer" data-seconds="${s.timer}" data-step="${i}">
              <button class="timer-btn" onclick="toggleTimer(this)">⏱ ${fmtTime(s.timer)}</button>
              <button class="timer-reset" onclick="resetTimer(this)">↺ reset</button>
            </div>
          ` : ''}
        </div>
      </div>
    `).join('');
  }

  function renderNotes() {
    document.getElementById('panel-notes').innerHTML = recipe.notes.map(n => `
      <div class="note-card">
        <div class="note-card-title">${n.title}</div>
        <p>${n.body}</p>
      </div>
    `).join('');
  }

  function updateServingsDisplay() {
    document.getElementById('s-val').textContent = servings;
    document.getElementById('s-note').textContent = `${servings} container${servings !== 1 ? 's' : ''}`;
  }

  function changeServings(delta) {
    servings = Math.max(1, servings + delta);
    updateServingsDisplay();
    renderIngredients();
  }

  function showTab(name, btn) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    btn.classList.add('active');
  }

  function toggleStep(n) {
    document.getElementById('step-' + n).classList.toggle('done');
  }

  const timerState = {};

  function fmtTime(s) {
    const m = Math.floor(s / 60);
    return `${m}:${String(s % 60).padStart(2, '0')}`;
  }

  function toggleTimer(btn) {
    const wrap = btn.closest('.step-timer');
    const key = wrap.dataset.step;
    const dur = parseInt(wrap.dataset.seconds);
    const reset = wrap.querySelector('.timer-reset');

    if (!timerState[key]) timerState[key] = { remaining: dur, interval: null };
    const st = timerState[key];

    if (st.interval) {
      clearInterval(st.interval);
      st.interval = null;
      btn.textContent = `⏱ ${fmtTime(st.remaining)}`;
      btn.classList.remove('running');
    } else {
      btn.classList.add('running');
      reset.style.display = 'inline';
      st.interval = setInterval(() => {
        st.remaining--;
        if (st.remaining <= 0) {
          clearInterval(st.interval);
          st.interval = null;
          btn.textContent = '✓ Done';
          btn.classList.remove('running');
          btn.classList.add('done');
          if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        } else {
          btn.textContent = `⏸ ${fmtTime(st.remaining)}`;
        }
      }, 1000);
      btn.textContent = `⏸ ${fmtTime(st.remaining)}`;
    }
  }

  function resetTimer(resetBtn) {
    const wrap = resetBtn.closest('.step-timer');
    const key = wrap.dataset.step;
    const dur = parseInt(wrap.dataset.seconds);
    const btn = wrap.querySelector('.timer-btn');
    const st = timerState[key];
    if (st) { clearInterval(st.interval); st.interval = null; st.remaining = dur; }
    btn.textContent = `⏱ ${fmtTime(dur)}`;
    btn.classList.remove('running', 'done');
    resetBtn.style.display = 'none';
  }
</script>
</body>
</html>
