<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400;1,600&family=Lora:ital,wght@0,400;0,500;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5ede0;
    --surface: #fdf8f0;
    --surface2: #ede3d4;
    --border: #d9c9b0;
    --border-light: #e8d9c4;
    --text: #2c1a0e;
    --muted: #8b7355;
    --accent: #b5440c;
    --amber: #c97d15;
    --sage: #4a6741;
    --cream: #fdf8f0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Lora', Georgia, serif;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 56px 32px 48px;
    text-align: center;
  }
  .header-eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 16px;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 8vw, 64px);
    font-weight: 700;
    color: var(--text);
    line-height: 1.05;
  }
  header p {
    margin-top: 12px;
    font-style: italic;
    font-size: 15px;
    color: var(--muted);
  }
  .header-rule {
    width: 48px;
    height: 2px;
    background: var(--accent);
    margin: 20px auto 0;
  }

  main { max-width: 760px; margin: 0 auto; padding: 48px 24px 80px; }

  .category-section { margin-bottom: 56px; }
  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .recipe-grid { display: grid; gap: 12px; }

  .recipe-card {
    display: block;
    text-decoration: none;
    background: var(--surface);
    border: 1px solid var(--border-light);
    padding: 24px 28px;
    transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s;
    position: relative;
  }
  .recipe-card:hover {
    border-color: var(--border);
    box-shadow: 0 4px 20px rgba(44, 26, 14, 0.08);
    transform: translateY(-1px);
  }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
  .card-titles { flex: 1; }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.25;
    margin-bottom: 3px;
  }
  .card-subtitle {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--muted);
  }
  .card-arrow {
    color: var(--border);
    font-size: 20px;
    line-height: 1.25;
    transition: color 0.2s, transform 0.2s;
    flex-shrink: 0;
  }
  .recipe-card:hover .card-arrow { color: var(--accent); transform: translateX(3px); }

  .card-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.65;
    margin-top: 10px;
    margin-bottom: 16px;
  }

  .card-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .card-macros { display: flex; gap: 16px; }
  .card-macro {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .card-macro b { color: var(--text); font-weight: 500; }
  .card-protein {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    font-weight: 500;
  }

  .card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .card-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 3px 8px;
  }
</style>
</head>
<body>
<header>
  <div class="header-eyebrow">Santosh's Kitchen</div>
  <h1>Recipes</h1>
  <p>Meal prepped. High protein. Built to keep you out of DoorDash.</p>
  <div class="header-rule"></div>
</header>
<main id="main">
  <div style="color:var(--muted);font-size:13px;font-style:italic">Loading...</div>
</main>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
  import { getFirestore, collection, getDocs, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

  const FIREBASE_CONFIG = {
    apiKey:            "AIzaSyCdWDvObKrSCfqeHsbENsEjJMTVdRGh2mk",
    authDomain:        "recipes-496701.firebaseapp.com",
    projectId:         "recipes-496701",
    storageBucket:     "recipes-496701.firebasestorage.app",
    messagingSenderId: "151018575958",
    appId:             "1:151018575958:web:5b1c87caa5b1dacdf383f7",
  };

  const app = initializeApp(FIREBASE_CONFIG);
  const db  = getFirestore(app);

  const categoryOrder = ['Dinner', 'Smoothies', 'Breakfast', 'Lunch', 'Snack'];

  function renderRecipes(recipes) {
    const grouped = {};
    for (const r of recipes) {
      if (!grouped[r.category]) grouped[r.category] = [];
      grouped[r.category].push(r);
    }

    const categories = categoryOrder.filter(c => grouped[c]);
    for (const c of Object.keys(grouped)) {
      if (!categories.includes(c)) categories.push(c);
    }

    const main = document.getElementById('main');
    main.innerHTML = categories.map(cat => `
      <div class="category-section">
        <div class="section-label">${cat}</div>
        <div class="recipe-grid">
          ${grouped[cat].map(r => `
            <a class="recipe-card" href="recipe.html?id=${r.id}">
              <div class="card-header">
                <div class="card-titles">
                  <div class="card-title">${r.title}</div>
                  ${r.subtitle ? `<div class="card-subtitle">${r.subtitle}</div>` : ''}
                </div>
                <div class="card-arrow">→</div>
              </div>
              ${r.description ? `<div class="card-desc">${r.description}</div>` : ''}
              <div class="card-footer">
                <div class="card-macros">
                  <span class="card-protein">${r.macros?.protein ?? 0}g protein</span>
                  <span class="card-macro"><b>${r.macros?.calories ?? 0}</b> kcal</span>
                </div>
                <div class="card-tags">${(r.tags || []).map(t => `<span class="card-tag">${t}</span>`).join('')}</div>
              </div>
            </a>
          `).join('')}
        </div>
      </div>
    `).join('');
  }

  const main = document.getElementById('main');
  try {
    const snapshot = await getDocs(query(collection(db, 'recipes'), orderBy('category')));
    const recipes = snapshot.docs.map(d => d.data());
    if (recipes.length === 0) {
      main.innerHTML = '<div style="color:var(--muted);font-size:14px;font-style:italic">No recipes yet.</div>';
    } else {
      renderRecipes(recipes);
    }
  } catch (err) {
    main.innerHTML = `<div style="color:var(--muted);font-size:13px">Failed to load: ${err.message}</div>`;
  }
</script>
</body>
</html>
