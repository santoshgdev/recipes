<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111110;
    --surface: #1a1918;
    --surface-hover: #212020;
    --border: #2a2826;
    --text: #f0ebe4;
    --muted: #6b6258;
    --subtle: #3a3632;
    --accent: #e9a84c;
    --accent-dim: rgba(233,168,76,0.12);
    --green: #52a46e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-weight: 300; min-height: 100vh; }

  header {
    padding: 60px 32px 52px;
    border-bottom: 1px solid var(--border);
    max-width: 760px;
    margin: 0 auto;
  }
  .eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(40px, 8vw, 68px);
    color: var(--text);
    line-height: 1;
    letter-spacing: -1px;
  }
  header p {
    margin-top: 14px;
    font-size: 14px;
    color: var(--muted);
    max-width: 360px;
    line-height: 1.6;
  }

  main { max-width: 760px; margin: 0 auto; padding: 48px 32px 96px; }

  .category-section { margin-bottom: 52px; }
  .section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--subtle);
    margin-bottom: 16px;
  }

  .recipe-grid { display: grid; gap: 1px; background: var(--border); border: 1px solid var(--border); }

  .recipe-card {
    display: block;
    text-decoration: none;
    background: var(--surface);
    padding: 24px 28px;
    transition: background 0.15s;
    position: relative;
  }
  .recipe-card:hover { background: var(--surface-hover); }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 21px;
    color: var(--text);
    line-height: 1.2;
  }
  .card-subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 3px;
    font-style: italic;
  }
  .card-arrow {
    font-size: 16px;
    color: var(--subtle);
    transition: color 0.15s, transform 0.15s;
    flex-shrink: 0;
    margin-top: 4px;
  }
  .recipe-card:hover .card-arrow { color: var(--accent); transform: translateX(3px); }

  .card-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.65;
    margin-bottom: 16px;
  }

  .card-bottom { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .card-macros { display: flex; gap: 20px; }
  .macro-item { font-size: 12px; color: var(--muted); }
  .macro-item b { color: var(--text); font-weight: 500; }
  .macro-protein { font-size: 12px; color: var(--accent); font-weight: 500; }

  .card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .card-tag {
    font-size: 10px;
    letter-spacing: 0.5px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 3px 9px;
  }
</style>
</head>
<body>
<header>
  <div class="eyebrow">Santosh's Kitchen</div>
  <h1>Recipes</h1>
  <p>Meal prepped. High protein. Built to keep you out of DoorDash.</p>
</header>
<main id="main">
  <div style="color:var(--muted);font-size:13px">Loading...</div>
</main>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
  import { getFirestore, collection, getDocs, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

  const FIREBASE_CONFIG = {
    apiKey:            "AIzaSyCdWDvObKrSCfqeHsbENsEjJMTVdRGh2mk",
    authDomain:        "recipes-496701.firebaseapp.com",
    projectId:         "recipes-496701",
    storageBucket:     "recipes-496701.firebasestorage.app",
    messagingSenderId: "151018575958",
    appId:             "1:151018575958:web:5b1c87caa5b1dacdf383f7",
  };

  const app = initializeApp(FIREBASE_CONFIG);
  const db  = getFirestore(app);
  const categoryOrder = ['Dinner', 'Smoothies', 'Breakfast', 'Lunch', 'Snack'];

  function renderRecipes(recipes) {
    const grouped = {};
    for (const r of recipes) {
      if (!grouped[r.category]) grouped[r.category] = [];
      grouped[r.category].push(r);
    }
    const categories = categoryOrder.filter(c => grouped[c]);
    for (const c of Object.keys(grouped)) if (!categories.includes(c)) categories.push(c);

    document.getElementById('main').innerHTML = categories.map(cat => `
      <div class="category-section">
        <div class="section-label">${cat}</div>
        <div class="recipe-grid">
          ${grouped[cat].map(r => `
            <a class="recipe-card" href="recipe.html?id=${r.id}">
              <div class="card-top">
                <div>
                  <div class="card-title">${r.title}</div>
                  ${r.subtitle ? `<div class="card-subtitle">${r.subtitle}</div>` : ''}
                </div>
                <div class="card-arrow">→</div>
              </div>
              ${r.description ? `<div class="card-desc">${r.description}</div>` : ''}
              <div class="card-bottom">
                <div class="card-macros">
                  <span class="macro-protein">${r.macros?.protein ?? 0}g protein</span>
                  <span class="macro-item"><b>${r.macros?.calories ?? 0}</b> kcal</span>
                </div>
                <div class="card-tags">${(r.tags||[]).map(t=>`<span class="card-tag">${t}</span>`).join('')}</div>
              </div>
            </a>
          `).join('')}
        </div>
      </div>
    `).join('');
  }

  try {
    const snapshot = await getDocs(query(collection(db, 'recipes'), orderBy('category')));
    const recipes = snapshot.docs.map(d => d.data());
    if (!recipes.length) {
      document.getElementById('main').innerHTML = '<div style="color:var(--muted);font-size:13px">No recipes yet.</div>';
    } else {
      renderRecipes(recipes);
    }
  } catch (err) {
    document.getElementById('main').innerHTML = `<div style="color:var(--muted);font-size:13px">Failed to load: ${err.message}</div>`;
  }
</script>
</body>
</html>
