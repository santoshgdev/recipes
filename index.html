<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipes</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0c;
    --line: #1e1e1e;
    --text: #f0f0f0;
    --muted: #555;
    --dim: #2a2a2a;
    --accent: #d4a843;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

  header {
    max-width: 900px;
    margin: 0 auto;
    padding: 72px 40px 64px;
    border-bottom: 1px solid var(--line);
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(52px, 10vw, 96px);
    font-weight: 700;
    line-height: 0.95;
    letter-spacing: -2px;
    color: var(--text);
  }
  .header-meta {
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .header-by {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .header-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--dim); }
  .header-desc { font-size: 13px; color: var(--muted); font-style: italic; }

  main { max-width: 900px; margin: 0 auto; padding: 0 40px 96px; }

  .cat-block { padding-top: 56px; }
  .cat-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .recipe-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    padding: 18px 0;
    border-top: 1px solid var(--line);
    text-decoration: none;
    color: inherit;
    position: relative;
  }
  .recipe-row:last-child { border-bottom: 1px solid var(--line); }

  .row-left { flex: 1; min-width: 0; }
  .row-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(20px, 3.5vw, 30px);
    font-weight: 700;
    color: var(--text);
    line-height: 1.1;
    transition: color 0.15s;
  }
  .recipe-row:hover .row-title { color: var(--accent); }
  .row-subtitle {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  .row-right {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
  }
  .row-protein {
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    white-space: nowrap;
  }
  .row-kcal {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }
  .row-thumb {
    width: 72px;
    height: 56px;
    object-fit: cover;
    flex-shrink: 0;
    display: block;
    filter: brightness(0.9);
    transition: filter 0.2s;
  }
  .recipe-row:hover .row-thumb { filter: brightness(1); }
  .row-thumb-placeholder {
    width: 72px;
    height: 56px;
    flex-shrink: 0;
    background: var(--line);
  }
  .row-arrow {
    font-size: 18px;
    color: var(--dim);
    transition: color 0.15s, transform 0.15s;
  }
  .recipe-row:hover .row-arrow { color: var(--accent); transform: translateX(4px); }

  @media (max-width: 600px) {
    header { padding: 48px 24px 40px; }
    main { padding: 0 24px 64px; }
    .row-kcal { display: none; }
    .row-title { font-size: 22px; }
  }
</style>
</head>
<body>
<header>
  <h1>Recipes</h1>
  <div class="header-meta">
    <span class="header-by">Santosh's Kitchen</span>
    <div class="header-dot"></div>
    <span class="header-desc">Meal prepped. High protein.</span>
  </div>
</header>
<main id="main">
  <div style="color:var(--muted);font-size:13px;padding-top:48px">Loading...</div>
</main>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
  import { getFirestore, collection, getDocs, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

  const FIREBASE_CONFIG = {
    apiKey:            "AIzaSyCdWDvObKrSCfqeHsbENsEjJMTVdRGh2mk",
    authDomain:        "recipes-496701.firebaseapp.com",
    projectId:         "recipes-496701",
    storageBucket:     "recipes-496701.firebasestorage.app",
    messagingSenderId: "151018575958",
    appId:             "1:151018575958:web:5b1c87caa5b1dacdf383f7",
  };

  const app = initializeApp(FIREBASE_CONFIG);
  const db  = getFirestore(app);
  const categoryOrder = ['Dinner', 'Smoothies', 'Breakfast', 'Lunch', 'Snack'];

  function renderRecipes(recipes) {
    const grouped = {};
    for (const r of recipes) {
      if (!grouped[r.category]) grouped[r.category] = [];
      grouped[r.category].push(r);
    }
    const categories = categoryOrder.filter(c => grouped[c]);
    for (const c of Object.keys(grouped)) if (!categories.includes(c)) categories.push(c);

    document.getElementById('main').innerHTML = categories.map(cat => `
      <div class="cat-block">
        <div class="cat-label">${cat}</div>
        ${grouped[cat].map(r => `
          <a class="recipe-row" href="recipe.html?id=${r.id}">
            <div class="row-left">
              <div class="row-title">${r.title}</div>
              ${r.subtitle ? `<div class="row-subtitle">${r.subtitle}</div>` : ''}
            </div>
            <div class="row-right">
              <span class="row-protein">${r.macros?.protein ?? 0}g</span>
              <span class="row-kcal">${r.macros?.calories ?? 0} kcal</span>
              ${r.imageUrl
                ? `<img class="row-thumb" src="${r.imageUrl}" alt="${r.title}" loading="lazy">`
                : `<div class="row-thumb-placeholder"></div>`}
              <span class="row-arrow">→</span>
            </div>
          </a>
        `).join('')}
      </div>
    `).join('');
  }

  try {
    const snapshot = await getDocs(query(collection(db, 'recipes'), orderBy('category')));
    const recipes = snapshot.docs.map(d => d.data());
    if (!recipes.length) {
      document.getElementById('main').innerHTML = '<div style="color:var(--muted);font-size:13px;padding-top:48px">No recipes yet.</div>';
    } else {
      renderRecipes(recipes);
    }
  } catch (err) {
    document.getElementById('main').innerHTML = `<div style="color:var(--muted);font-size:13px;padding-top:48px">Error: ${err.message}</div>`;
  }
</script>
</body>
</html>
